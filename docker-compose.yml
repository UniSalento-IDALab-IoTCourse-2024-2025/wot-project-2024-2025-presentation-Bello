name: bello_antonio_chillchain
services:

  # ---- MQTT Broker ----------------------------------------------------------
  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf
    networks:
      - shared-net
    restart: unless-stopped

  # ---- Fridge Streamer (simula i sensori) -----------------------------------
  fridge-streamer:
    container_name: fridge-streamer
    image: antoniobello09/fridge-streamer:1.0.0
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - STREAM_INTERVAL=1.0
    networks:
      - shared-net
    depends_on:
      - mosquitto
    restart: unless-stopped

  # ---- Anomaly Detector (LSTM autoencoder) ----------------------------------
  anomaly-detector:
    container_name: anomaly-detector
    image: antoniobello09/anomaly-detector:1.0.0
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MODEL_PATH=autoencoder_model/30_lstm_autoencoder.pt
      - SCALER_PATH=autoencoder_model/scaler_training.pkl
      - ANOMALY_THRESHOLD=0.016
      - WINDOW_SIZE=30
    networks:
      - shared-net
    depends_on:
      - mosquitto
    restart: unless-stopped

  # ---- MongoDB --------------------------------------------------------------
  carrier-service-db:
    container_name: carrierservicemongodbimage
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - shared-net
    restart: unless-stopped

  # ---- Backend Spring Boot --------------------------------------------------
  carrier-service:
    container_name: carrierserviceimage
    image: antoniobello09/carrier-management-service:latest
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://carrier-service-db:27017/carrierdatabase
      - FRIDGE_API_URL=http://fridge-streamer:8002
    depends_on:
      - carrier-service-db
      - fridge-streamer
    networks:
      - shared-net
    restart: unless-stopped

  # ---- Frontend -----------------------------------
  frontend:
    container_name: chillchain-frontend
    image: antoniobello09/chillchain-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - carrier-service
    networks:
      - shared-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  shared-net:
    driver: bridge

configs:
  mosquitto_conf:
    content: |
      listener 1883
      allow_anonymous true
      listener 9001
      protocol websockets